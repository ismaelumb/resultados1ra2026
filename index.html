<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados de Admisión Universidad</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        input {
            width: 90%;
            padding: 12px;
            margin: 20px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }
        button {
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #004494;
        }
        #resultado {
            margin-top: 25px;
            font-size: 18px;
            font-weight: bold;
        }
        #loader {
            display: none;
            margin-top: 15px;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Consulta de Admisión</h2>
        <p>Ingresa tu folio de aspirante para verificar tus resultados:</p>
        
        <input type="text" id="folioInput" placeholder="Ej. 102938">
        <br>
        <button onclick="consultarResultado()">Consultar</button>

        <div id="loader">Buscando folio en el sistema...</div>
        <div id="resultado"></div>
    </div>

    <script>
        // ¡IMPORTANTE! Reemplaza esto con la URL que copiaste de Google Apps Script
        const SCRIPT_URL = 'PEGA_TU_URL_DE_APPS_SCRIPT_AQUI';

        function consultarResultado() {
            const folio = document.getElementById('folioInput').value;
            const resultadoDiv = document.getElementById('resultado');
            const loader = document.getElementById('loader');

            if (!folio) {
                alert("Por favor, ingresa tu folio de aspirante.");
                return;
            }

            // Limpiar resultados anteriores y mostrar loader
            resultadoDiv.innerHTML = '';
            loader.style.display = 'block';

            // Hacer la petición a Google Apps Script
            fetch(`${SCRIPT_URL}?folio=${encodeURIComponent(folio)}`)
                .then(response => response.json())
                .then(data => {
                    loader.style.display = 'none';
                    
                    if (data.encontrado) {
                        resultadoDiv.innerText = data.mensaje;
                        resultadoDiv.style.color = data.seleccionado ? '#28a745' : '#dc3545';

                        // Si fue seleccionado, activamos la animación de felicidad
                        if (data.seleccionado) {
                            lanzarAnimacionFelicidad();
                        }
                    } else {
                        resultadoDiv.innerText = data.mensaje;
                        resultadoDiv.style.color = '#ff9800';
                    }
                })
                .catch(error => {
                    loader.style.display = 'none';
                    resultadoDiv.innerText = 'Hubo un error al conectar con el servidor.';
                    resultadoDiv.style.color = 'red';
                    console.error('Error:', error);
                });
        }

        // Función para la animación de confeti
        function lanzarAnimacionFelicidad() {
            var duration = 3000; // 3 segundos
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#26ccff', '#a25afd', '#ff5e7e', '#88ff5a', '#fcff42', '#ffa62d', '#ff36ff']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#26ccff', '#a25afd', '#ff5e7e', '#88ff5a', '#fcff42', '#ffa62d', '#ff36ff']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>

</body>
</html>
